<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description"
        content="Rudra - First-year at IIIT Allahabad building projects in AI, web, and app development. Portfolio and links.">

    <meta name="keywords" content="Rudra, IIIT Allahabad, AI developer, web developer, app developer, portfolio">

    <meta name="author" content="Rudra">

    <meta property="og:title" content="Rudra | Portfolio">
    <meta property="og:description" content="AI, Web and App Developer from IIIT Allahabad">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rudraminaa.github.io">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Rudra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f0f;
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --subtext: #cccccc;
        }

        body.light {
            --bg: #f5f5f5;
            --card: rgba(255, 255, 255, 0.6);
            --text: #111;
            --subtext: #555;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            transition: 0.4s;
        }

        .card {
            backdrop-filter: blur(15px);
            background: var(--card);
            padding: 35px 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 22px;
        }

        .typing {
            font-size: 13px;
            color: var(--subtext);
            height: 18px;
            margin-bottom: 20px;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            padding: 11px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
            transition: 0.25s;
        }

        .links a:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        /* pastel accents */
        .links a:nth-child(1) {
            background: rgba(200, 220, 255, 0.2);
        }

        .links a:nth-child(2) {
            background: rgba(220, 200, 255, 0.2);
        }

        .links a:nth-child(3) {
            background: rgba(255, 200, 220, 0.2);
        }

        .toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="toggle" onclick="toggleTheme()">
        🌙
    </div>

    <div class="card">
        <img src="./profile.jpeg" class="avatar">

        <h1>Rudra</h1>
        <div class="typing" id="typing"></div>

        <div class="links">
            <a href="https://linkedin.com/in/rudramina"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://github.com/rudraminaa"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://instagram.com/rudraminaa"><i class="fab fa-instagram"></i> Instagram</a>
        </div>
    </div>

    <script>
        // Typing animation
        const text = "IIIT Allahabad • AI • Web • App Dev 🚀";
        let i = 0;
        function typingEffect() {
            if (i < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++;
                setTimeout(typingEffect, 40);
            }
        }
        typingEffect();

        // Dark/Light toggle
        function toggleTheme() {
            document.body.classList.toggle("light");
        }
    </script>

</body>

</html>
